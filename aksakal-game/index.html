<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Суд аксакалов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            padding: 20px;
            color: white;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .dialogue {
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #d4af37;
        }
        .speaker { color: #d4af37; font-weight: bold; margin-bottom: 10px; }
        button {
            background: #d4af37;
            border: none;
            padding: 12px;
            border-radius: 30px;
            margin: 5px;
            width: calc(100% - 10px);
            font-weight: bold;
            cursor: pointer;
        }
        .doc-btn {
            background: rgba(212,175,55,0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 15px;
            border-radius: 16px;
            margin: 8px 0;
            text-align: center;
            cursor: pointer;
        }
        .click-hint { text-align: center; margin-top: 15px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
<div class="container">
    <div class="dialogue">
        <div class="speaker" id="speakerName">📖 Загрузка</div>
        <div class="dialogue-text" id="dialogueText">Загрузка...</div>
    </div>
    <div class="click-hint" id="clickHint">▼ Нажмите на экран ▼</div>
    <div id="gamePanel"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();

    let step = 'prologue';
    let prologueIndex = 0;
    let evidence = {
        rais: false, vahit: false, zuhra: false,
        doc1: false, doc2: false, doc3: false,
        fatima: false, photo: false
    };

    const prologueTexts = [
        { speaker: '🎭 Вы', text: 'Сельский совет. Решается судьба участка земли.' },
        { speaker: '🎭 Вы', text: 'Антагонист хочет построить торговый центр. Но местные говорят — здесь было кладбище.' },
        { speaker: '👩‍💼 Глава сельсовета', text: 'Аксакалы расходятся во мнениях, архив сгорел. Помогите разобраться.' }
    ];

    const witnesses = [
        { name: 'Аксакал Раис', text: '«Никаких могил я не помню. Рощу вырубили в 1960-х. Нужны рабочие места»', id: 'rais' },
        { name: 'Аксакал Вахит', text: '«Я помню могилы, камни с надписями. В 1960-х бульдозерами всё сровняли»', id: 'vahit' },
        { name: 'Аксакал Зухра', text: '«Слышала от бабушки про рощу. Но документов нет. Может, не стоит цепляться?»', id: 'zuhra' }
    ];

    const documents = [
        { name: 'Хозяйственная книга, 1960 г.', text: '«При работах обнаружены камни и старые корни»', id: 'doc1' },
        { name: 'Ответ из архива, 1989 г.', text: '«Документов о закрытии кладбищ не имеется»', id: 'doc2' },
        { name: 'Дневник археолога, 1985 г.', text: '«Тёмная почва, крапива, фрагменты керамики»', id: 'doc3' }
    ];

    const extras = [
        { name: 'Бабушка Фатима', text: '«В детстве нас туда не пускали — там могилы»', id: 'fatima' },
        { name: 'Старая фотография, 1954 г.', text: 'На снимке видны тёмные холмики и деревья кругом.', id: 'photo' }
    ];

    function updateUI(speaker, text, panelHtml) {
        document.getElementById('speakerName').innerHTML = speaker;
        document.getElementById('dialogueText').innerHTML = text;
        document.getElementById('gamePanel').innerHTML = panelHtml || '';
    }

    function showPrologue() {
        if (prologueIndex < prologueTexts.length) {
            const p = prologueTexts[prologueIndex];
            updateUI(p.speaker, p.text, '');
        } else {
            startInvestigation();
        }
    }

    function startInvestigation() {
        step = 'investigation';
        updateUI('📂 Расследование', 'Изучите показания, документы и улики.', `
            <div>
                <div class="doc-btn" onclick="showWitnesses()">📋 Показания аксакалов</div>
                <div class="doc-btn" onclick="showDocuments()">📁 Архивные документы</div>
                <div class="doc-btn" onclick="showExtras()">🔍 Дополнительные улики</div>
                <button onclick="finishInvestigation()">⚖️ Завершить расследование</button>
            </div>
        `);
    }

    function showWitnesses() { showList(witnesses, 0, 'witness'); }
    function showDocuments() { showList(documents, 0, 'doc'); }
    function showExtras() { showList(extras, 0, 'extra'); }

    function showList(list, index, type) {
        if (index >= list.length) { startInvestigation(); return; }
        const item = list[index];
        let buttons = `<div>`;
        if (!evidence[item.id]) {
            buttons += `<button onclick="markItem(${index}, '${type}')">📌 Отметить как изученное</button>`;
        }
        buttons += `<button onclick="showList(${type === 'witness' ? 'witnesses' : (type === 'doc' ? 'documents' : 'extras')}, ${index + 1}, '${type}')">➡️ Далее</button>`;
        buttons += `<button onclick="startInvestigation()">🔙 Назад</button></div>`;
        updateUI(`📄 ${item.name}`, item.text, buttons);
    }

    function markItem(index, type) {
        let list = type === 'witness' ? witnesses : (type === 'doc' ? documents : extras);
        evidence[list[index].id] = true;
        tg.showAlert('Отмечено!');
        showList(list, index + 1, type);
    }

    function finishInvestigation() {
        step = 'final';
        updateUI('⚖️ Суд аксакалов', 'Вы собрали улики. Какая стратегия?', `
            <div>
                <div class="doc-btn" onclick="makeChoice('harsh')">⚡ Жёсткое разоблачение</div>
                <div class="doc-btn" onclick="makeChoice('soft')">🤝 Мягкое убеждение</div>
                <div class="doc-btn" onclick="makeChoice('compromise')">🏛️ Компромисс</div>
            </div>
        `);
    }

    function makeChoice(choice) {
        let text = choice === 'harsh' ? 'Вы разоблачили Раиса. Участок сохранён.' :
                   choice === 'soft' ? 'Вы доказали ценность земли без обвинений.' :
                   'Часть участка — под историческую зону.';
        updateUI('🏆 Эпилог', text + '\n\nГлава сельсовета благодарит вас.', `<button onclick="resetGame()">🎮 Пройти заново</button>`);
    }

    function resetGame() { location.reload(); }

    document.body.addEventListener('click', (e) => {
        if (e.target.tagName !== 'BUTTON' && step === 'prologue') {
            prologueIndex++;
            showPrologue();
        }
    });

    showPrologue();
    tg.ready();
</script>
</body>
</html>
