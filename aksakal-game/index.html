<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Суд аксакалов - визуальная новелла</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            background: #0a0a1a;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            overflow-y: auto;
        }

        .scene {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            cursor: pointer;
        }

        /* ФОНЫ */
        .scene.office { background-image: url('images/office.jpg'); background-size: cover; }
        .scene.archive { background-image: url('images/archive.jpg'); background-size: cover; }
        .scene.witness { background-image: url('images/witness.jpg'); background-size: cover; }
        .scene.court { background-image: url('images/court.jpg'); background-size: cover; }

        .dialogue-box {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #d4af37;
            color: #f0e6d2;
            font-size: 17px;
            line-height: 1.5;
        }

        .speaker-name {
            color: #d4af37;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dialogue-text {
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .game-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-top: 10px;
        }

        .documents-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 15px 0;
        }

        .doc-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
            text-align: left;
            padding: 15px;
            border-radius: 16px;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #d4af37, #b8960c);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            transition: transform 0.2s;
            font-family: 'Roboto', sans-serif;
            width: calc(100% - 10px);
        }

        button:hover {
            transform: scale(1.02);
        }

        .choice-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid #d4af37;
            color: #d4af37;
            text-align: center;
            padding: 15px;
            border-radius: 16px;
            cursor: pointer;
            margin: 8px 0;
        }

        .click-hint {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .evidence-count {
            text-align: center;
            margin-top: 15px;
            color: #d4af37;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="scene office" id="scene">
        <div class="dialogue-box" id="dialogueBox">
            <div class="speaker-name" id="speakerName">
                <span>🎭</span> Вы
            </div>
            <div class="dialogue-text" id="dialogueText">
                Загрузка...
            </div>
        </div>
        <div class="click-hint" id="clickHint">▼ Нажмите на экран, чтобы продолжить ▼</div>
        <div id="gamePanel"></div>
        <div class="evidence-count hidden" id="evidenceCount"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();

    // ========== СОСТОЯНИЕ ==========
    let state = {
        mode: 'narrative',
        evidence: {
            rais: false, vahit: false, zuhra: false,
            doc1: false, doc2: false, doc3: false,
            fatima: false, photo: false
        }
    };

    // ========== СЦЕНАРИЙ ==========
    const prologueScenes = [
        { speaker: 'Вы', icon: '🎭', text: 'Сельский совет. Небольшое здание, где решается судьба участка земли.' },
        { speaker: 'Вы', icon: '🎭', text: 'Антагонист хочет построить здесь торговый центр. Но местные говорят — здесь было кладбище и священная роща.' },
        { speaker: 'Глава сельсовета', icon: '👩‍💼', text: 'Добро пожаловать. Аксакалы расходятся во мнениях, архив сгорел. Помогите разобраться.' },
        { speaker: 'Глава сельсовета', icon: '👩‍💼', text: 'Я передаю вам три папки с показаниями и доступ к архиву. Изучите всё внимательно.' }
    ];

    // Показания аксакалов
    const witnessStatements = [
        { speaker: 'Аксакал Раис', icon: '👴', text: '«Никаких могил я не помню. Рощу вырубили в 1960-х. Антагонист предлагает рабочие места. А эти легенды — выдумки»', id: 'rais' },
        { speaker: 'Аксакал Вахит', icon: '👴', text: '«Я помню могилы, камни с надписями. В 1960-х бульдозерами всё сровняли. Но корни старых деревьев до сих пор там»', id: 'vahit' },
        { speaker: 'Аксакал Зухра', icon: '👵', text: '«Слышала от бабушки про рощу. Но документов нет. Может, не стоит цепляться за то, чего уже нет?»', id: 'zuhra' }
    ];

    // Архивные документы
    const archiveDocs = [
        { name: 'Хозяйственная книга, 1960 год', text: '«При работах обнаружены препятствия: крупные камни, старые корни. Корни сожжены на месте. Председатель колхоза (подпись неразборчиво)»', id: 'doc1' },
        { name: 'Ответ из районного архива, 1989 год', text: '«Документов о закрытии кладбищ не имеется. Часть документов утрачена в годы войны»', id: 'doc2' },
        { name: 'Полевой дневник археолога, 1985 год', text: '«Пятно тёмной почвы, крапива, лопух. Фрагменты керамики, обработанный камень. Требует изучения»', id: 'doc3' }
    ];

    // Дополнительные улики
    const extraEvidence = [
        { name: 'Бабушка Фатима (92 года)', text: '«В детстве нас туда не пускали — там могилы. В 1960-х бульдозеры корни ломали»', id: 'fatima' },
        { name: 'Старая фотография из альбома, 1954 год', text: 'На обороте подпись: «Тептяри, вид на восточную околицу». На снимке видны тёмные холмики и деревья, образующие круг.', id: 'photo' }
    ];

    let prologueIndex = 0;
    let currentWitnessIndex = 0;
    let currentDocIndex = 0;
    let currentExtraIndex = 0;

    const sceneDiv = document.getElementById('scene');
    const speakerNameSpan = document.getElementById('speakerName');
    const dialogueTextSpan = document.getElementById('dialogueText');
    const gamePanelDiv = document.getElementById('gamePanel');
    const clickHint = document.getElementById('clickHint');
    const evidenceCountDiv = document.getElementById('evidenceCount');

    function setBackground(bgClass) {
        sceneDiv.classList.remove('office', 'archive', 'witness', 'court');
        sceneDiv.classList.add(bgClass);
    }

    function updateEvidenceCount() {
        const count = Object.values(state.evidence).filter(Boolean).length;
        evidenceCountDiv.innerHTML = `📋 Улик собрано: ${count}/8`;
    }

    function showPrologue() {
        setBackground('office');
        gamePanelDiv.innerHTML = '';
        evidenceCountDiv.classList.add('hidden');
        clickHint.style.display = 'block';
        
        if (prologueIndex < prologueScenes.length) {
            const scene = prologueScenes[prologueIndex];
            speakerNameSpan.innerHTML = `<span>${scene.icon}</span> ${scene.speaker}`;
            dialogueTextSpan.innerHTML = scene.text;
        } else {
            startInvestigation();
        }
    }

    function startInvestigation() {
        state.mode = 'investigation';
        setBackground('archive');
        clickHint.style.display = 'none';
        evidenceCountDiv.classList.remove('hidden');
        updateEvidenceCount();
        
        speakerNameSpan.innerHTML = `<span>📂</span> Расследование`;
        dialogueTextSpan.innerHTML = 'Изучите показания аксакалов, архивные документы и найдите дополнительные улики.';
        
        gamePanelDiv.innerHTML = `
            <div class="game-panel">
                <div class="documents-grid">
                    <div class="doc-btn" onclick="showWitnesses()">📋 Показания аксакалов</div>
                    <div class="doc-btn" onclick="showArchiveDocs()">📁 Архивные документы</div>
                    <div class="doc-btn" onclick="showExtraEvidence()">🔍 Дополнительные улики</div>
                </div>
                <button onclick="finishInvestigation()">⚖️ Завершить расследование</button>
            </div>
        `;
    }

    function showWitnesses() {
        setBackground('witness');
        currentWitnessIndex = 0;
        showWitness(0);
    }

    function showWitness(index) {
        if (index >= witnessStatements.length) {
            startInvestigation();
            return;
        }
        const w = witnessStatements[index];
        speakerNameSpan.innerHTML = `<span>${w.icon}</span> ${w.speaker}`;
        dialogueTextSpan.innerHTML = w.text;
        
        gamePanelDiv.innerHTML = `
            <div class="game-panel">
                ${!state.evidence[w.id] ? `<button onclick="markWitness(${index})">📌 Отметить как изученное</button>` : ''}
                <button onclick="showWitness(${index + 1})">➡️ Следующий аксакал</button>
                <button onclick="startInvestigation()">🔙 Вернуться к расследованию</button>
            </div>
        `;
    }

    function markWitness(index) {
        const w = witnessStatements[index];
        state.evidence[w.id] = true;
        updateEvidenceCount();
        tg.showAlert('Показания отмечены');
        showWitness(index + 1);
    }

    function showArchiveDocs() {
        setBackground('archive');
        currentDocIndex = 0;
        showDoc(0);
    }

    function showDoc(index) {
        if (index >= archiveDocs.length) {
            startInvestigation();
            return;
        }
        const d = archiveDocs[index];
        speakerNameSpan.innerHTML = `<span>📄</span> ${d.name}`;
        dialogueTextSpan.innerHTML = d.text;
        
        gamePanelDiv.innerHTML = `
            <div class="game-panel">
                ${!state.evidence[d.id] ? `<button onclick="markDoc(${index})">📌 Отметить как изученное</button>` : ''}
                <button onclick="showDoc(${index + 1})">➡️ Следующий документ</button>
                <button onclick="startInvestigation()">🔙 Вернуться к расследованию</button>
            </div>
        `;
    }

    function markDoc(index) {
        const d = archiveDocs[index];
        state.evidence[d.id] = true;
        updateEvidenceCount();
        tg.showAlert('Документ отмечен');
        showDoc(index + 1);
    }

    function showExtraEvidence() {
        setBackground('witness');
        currentExtraIndex = 0;
        showExtra(0);
    }

    function showExtra(index) {
        if (index >= extraEvidence.length) {
            startInvestigation();
            return;
        }
        const e = extraEvidence[index];
        speakerNameSpan.innerHTML = `<span>🔍</span> ${e.name}`;
        dialogueTextSpan.innerHTML = e.text;
        
        gamePanelDiv.innerHTML = `
            <div class="game-panel">
                ${!state.evidence[e.id] ? `<button onclick="markExtra(${index})">📌 Отметить как изученное</button>` : ''}
                <button onclick="showExtra(${index + 1})">➡️ Следующая улика</button>
                <button onclick="startInvestigation()">🔙 Вернуться к расследованию</button>
            </div>
        `;
    }

    function markExtra(index) {
        const e = extraEvidence[index];
        state.evidence[e.id] = true;
        updateEvidenceCount();
        tg.showAlert('Улика добавлена');
        showExtra(index + 1);
    }

    function finishInvestigation() {
        state.mode = 'final';
        setBackground('court');
        speakerNameSpan.innerHTML = `<span>⚖️</span> Суд аксакалов`;
        dialogueTextSpan.innerHTML = 'Вы собрали улики. Какая стратегия вам ближе?';
        
        gamePanelDiv.innerHTML = `
            <div class="game-panel">
                <div class="choice-btn" onclick="makeChoice('harsh')">⚡ Жёсткое разоблачение<br><small>Указать на противоречия Раиса</small></div>
                <div class="choice-btn" onclick="makeChoice('soft')">🤝 Мягкое убеждение<br><small>Доказать историческую ценность без обвинений</small></div>
                <div class="choice-btn" onclick="makeChoice('compromise')">🏛️ Компромисс<br><small>Выделить часть участка под историческую зону</small></div>
            </div>
        `;
    }

    function makeChoice(choice) {
        let epilogue = '';
        if (choice === 'harsh') {
            epilogue = 'Вы публично указали на противоречия в словах Раиса. Суд аксакалов признал ваши аргументы убедительными. Раис потерял авторитет, старейшины подтвердили историческую ценность земли. Участок сохранён.';
        } else if (choice === 'soft') {
            epilogue = 'Вы не выносили личных обвинений, а сосредоточились на доказательствах. Раис вынужден изменить показания под давлением фактов. Земля признана исторически значимой.';
        } else {
            epilogue = 'Вы признали, что прямых юридических доказательств нет, но совокупность улик достаточна. Часть участка выделена под историческую зону, остальное — для развития. Раис согласен, но часть жителей недовольна.';
        }
        
        speakerNameSpan.innerHTML = `<span>🏆</span> Эпилог`;
        dialogueTextSpan.innerHTML = `${epilogue}\n\nГлава сельсовета благодарит вас за помощь. Вы получили новые улики для основного расследования и заслужили уважение местных жителей.`;
        
        gamePanelDiv.innerHTML = `<div class="game-panel"><button onclick="resetGame()">🎮 Пройти заново</button></div>`;
        evidenceCountDiv.classList.add('hidden');
        tg.MainButton.setText('🏆 Завершить');
        tg.MainButton.show();
    }

    function resetGame() {
        location.reload();
    }

    sceneDiv.addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        if (state.mode === 'narrative') {
            prologueIndex++;
            showPrologue();
        }
    });

    showPrologue();
    tg.ready();
</script>
</body>
</html>
