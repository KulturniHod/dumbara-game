<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Суд аксакалов - визуальная новелла</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Roboto', sans-serif; background: #0a0a1a; overflow: hidden; }
        .game-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; height: 100vh; overflow-y: auto; }
        .scene { position: relative; width: 100%; min-height: 100vh; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; cursor: pointer; }
        .scene.village { background-image: url('https://images.unsplash.com/photo-1582653291997-079a1b04e6d1?w=500'); }
        .scene.office { background-image: url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=500'); }
        .scene.archive { background-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=500'); }
        .scene.witness { background-image: url('https://images.unsplash.com/photo-1529101091764-c3526daf3f28?w=500'); }
        .scene.court { background-image: url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=500'); }
        .dialogue-box { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-radius: 24px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #d4af37; color: #f0e6d2; }
        .speaker-name { color: #d4af37; font-weight: bold; font-size: 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .dialogue-text { font-size: 16px; line-height: 1.5; white-space: pre-line; }
        .game-panel { background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); border-radius: 24px; padding: 20px; margin-top: 10px; }
        .documents-grid { display: flex; flex-direction: column; gap: 12px; }
        .doc-btn { background: rgba(212,175,55,0.15); border: 1px solid #d4af37; color: #d4af37; text-align: left; padding: 15px; border-radius: 16px; cursor: pointer; }
        button { background: linear-gradient(135deg, #d4af37, #b8960c); border: none; padding: 12px; border-radius: 30px; color: #1a1a2e; font-weight: bold; cursor: pointer; margin: 5px; width: calc(100% - 10px); }
        .choice-btn { background: rgba(212,175,55,0.15); border: 1px solid #d4af37; color: #d4af37; text-align: center; padding: 15px; }
        .click-hint { text-align: center; margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.5); }
        .evidence-count { margin-top: 10px; font-size: 12px; color: #d4af37; text-align: center; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="scene village" id="scene">
        <div class="dialogue-box" id="dialogueBox">
            <div class="speaker-name" id="speakerName"><span>🎭</span> Вы</div>
            <div class="dialogue-text" id="dialogueText">Загрузка...</div>
        </div>
        <div class="click-hint" id="clickHint">▼ Нажмите на экран, чтобы продолжить ▼</div>
        <div id="gamePanel"></div>
        <div class="evidence-count" id="evidenceCount" style="display:none;"></div>
    </div>
</div>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();

    let state = { mode: 'narrative', evidence: { rais: false, vahit: false, zuhra: false, document1: false, document2: false, document3: false, fatima: false, photo: false } };
    const prologue = [
        { speaker: 'Вы', icon: '🎭', text: 'Сельский совет. Небольшое здание, где решается судьба участка земли.' },
        { speaker: 'Вы', icon: '🎭', text: 'Антагонист хочет построить здесь торговый центр. Но местные говорят — здесь было кладбище и священная роща.' },
        { speaker: 'Глава сельсовета', icon: '👩‍💼', text: 'Добро пожаловать. Аксакалы расходятся во мнениях, архив сгорел. Помогите разобраться.' }
    ];
    const witnesses = [
        { speaker: 'Аксакал Раис', icon: '👴', text: '«Никаких могил я не помню. Рощу вырубили в 1960-х. Антагонист предлагает рабочие места. А эти легенды — выдумки, чтобы деньги сбить»', id: 'rais' },
        { speaker: 'Аксакал Вахит', icon: '👴', text: '«Я помню могилы, камни с надписями. В 1960-х бульдозерами всё сровняли. Но корни старых деревьев до сих пор там»', id: 'vahit' },
        { speaker: 'Аксакал Зухра', icon: '👵', text: '«Слышала от бабушки про рощу. Но документов нет. Если ничего нет — зачем цепляться? Нужны рабочие места»', id: 'zuhra' }
    ];
    const docs = [
        { name: 'Хозяйственная книга, 1960', text: '«При работах обнаружены препятствия: крупные камни, старые корни. Корни сожжены на месте»', id: 'document1' },
        { name: 'Ответ из архива, 1989', text: '«Документов о закрытии кладбищ не имеется. Часть утрачена»', id: 'document2' },
        { name: 'Дневник археолога, 1985', text: '«Пятно тёмной почвы, крапива, лопух. Фрагменты керамики, обработанный камень»', id: 'document3' }
    ];
    const extras = [
        { name: 'Бабушка Фатима, 92 года', text: '«В детстве нас туда не пускали — там могилы. В 1960-х бульдозеры корни ломали»', id: 'fatima' },
        { name: 'Старая фотография, 1954', text: 'На снимке видны тёмные холмики и деревья, образующие круг.', id: 'photo' }
    ];
    let prologueIdx = 0;
    function setBg(c) { sceneDiv.classList.remove('village','office','archive','witness','court'); sceneDiv.classList.add(c); }
    const sceneDiv = document.getElementById('scene');
    const speakerSpan = document.getElementById('speakerName');
    const textSpan = document.getElementById('dialogueText');
    const panelDiv = document.getElementById('gamePanel');
    const clickHintDiv = document.getElementById('clickHint');
    const evidenceDiv = document.getElementById('evidenceCount');
    function updateCount() { let c = Object.values(state.evidence).filter(v=>v).length; evidenceDiv.innerHTML = `📋 Улик собрано: ${c}/8`; }
    function showPrologue() {
        setBg('office'); panelDiv.innerHTML = ''; evidenceDiv.style.display = 'none'; clickHintDiv.style.display = 'block';
        if (prologueIdx < prologue.length) {
            speakerSpan.innerHTML = `<span>${prologue[prologueIdx].icon}</span> ${prologue[prologueIdx].speaker}`;
            textSpan.innerHTML = prologue[prologueIdx].text;
        } else startInvestigation();
    }
    function startInvestigation() {
        state.mode = 'investigation'; setBg('archive'); clickHintDiv.style.display = 'none'; evidenceDiv.style.display = 'block'; updateCount();
        speakerSpan.innerHTML = `<span>📂</span> Расследование`;
        textSpan.innerHTML = 'Изучите показания аксакалов, архивные документы и найдите дополнительные улики.';
        panelDiv.innerHTML = `<div class="game-panel"><div class="documents-grid"><div class="doc-btn" onclick="showWitnesses()">📋 Показания аксакалов</div><div class="doc-btn" onclick="showDocs()">📁 Архивные документы</div><div class="doc-btn" onclick="showExtras()">🔍 Дополнительные улики</div></div><button class="game-button" onclick="finishInvestigation()">⚖️ Завершить расследование</button></div>`;
    }
    function showWitnesses() { setBg('witness'); showList(witnesses, 0, 'witness'); }
    function showDocs() { setBg('archive'); showList(docs, 0, 'doc'); }
    function showExtras() { setBg('witness'); showList(extras, 0, 'extra'); }
    function showList(arr, idx, type) {
        if (idx >= arr.length) { backToInvestigation(); return; }
        let item = arr[idx];
        speakerSpan.innerHTML = `<span>📄</span> ${item.name || item.speaker}`;
        textSpan.innerHTML = item.text;
        panelDiv.innerHTML = `<div class="game-panel"><button onclick="mark('${item.id}', '${type}', ${idx})">📌 Отметить</button><button onclick="showList(arr, ${idx+1}, '${type}')">➡️ Далее</button><button onclick="backToInvestigation()">🔙 Назад</button></div>`;
    }
    window.mark = function(id, type, idx) {
        state.evidence[id] = true; updateCount(); tg.showAlert('Отмечено');
        if (type === 'witness') showList(witnesses, idx+1, 'witness');
        else if (type === 'doc') showList(docs, idx+1, 'doc');
        else showList(extras, idx+1, 'extra');
    };
    function backToInvestigation() { startInvestigation(); }
    function finishInvestigation() {
        setBg('court'); state.mode = 'final';
        speakerSpan.innerHTML = `<span>⚖️</span> Суд аксакалов`;
        textSpan.innerHTML = 'Вы собрали улики. Какая стратегия?';
        panelDiv.innerHTML = `<div class="game-panel"><div class="documents-grid"><div class="doc-btn" onclick="makeChoice('harsh')">⚡ Жёсткое разоблачение</div><div class="doc-btn" onclick="makeChoice('soft')">🤝 Мягкое убеждение</div><div class="doc-btn" onclick="makeChoice('compromise')">🏛️ Компромисс</div></div></div>`;
    }
    function makeChoice(c) {
        let ep = c==='harsh'?'Вы указали на противоречия Раиса. Суд признал землю исторической.':
                 c==='soft'?'Вы доказали ценность без обвинений. Раис изменил показания.':
                 'Часть участка — под историческую зону, остальное — под развитие.';
        speakerSpan.innerHTML = `<span>🏆</span> Эпилог`;
        textSpan.innerHTML = ep+'\n\nГлава сельсовета благодарит вас. Вы получили новые улики для основного расследования.';
        panelDiv.innerHTML = `<div class="game-panel"><button onclick="resetGame()">🎮 Пройти заново</button></div>`;
        evidenceDiv.style.display = 'none';
    }
    function resetGame() { location.reload(); }
    sceneDiv.addEventListener('click', (e) => { if(e.target.tagName!=='BUTTON' && state.mode==='narrative') { prologueIdx++; showPrologue(); } });
    showPrologue(); tg.ready();
</script>
</body>
</html>
