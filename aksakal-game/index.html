<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Суд аксакалов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .dialogue {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #d4af37;
            color: #f0e6d2;
        }

        .speaker {
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .dialogue-text {
            font-size: 16px;
            line-height: 1.5;
        }

        .game-panel {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 20px;
            padding: 20px;
            margin-top: 10px;
        }

        button {
            background: linear-gradient(135deg, #d4af37, #b8960c);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            width: calc(100% - 10px);
        }

        .doc-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 15px;
            border-radius: 16px;
            margin: 8px 0;
            cursor: pointer;
            text-align: center;
        }

        .click-hint {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }

        .evidence-count {
            text-align: center;
            margin-top: 15px;
            color: #d4af37;
            font-size: 12px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="dialogue" id="dialogueBox">
        <div class="speaker" id="speakerName">📖 Загрузка</div>
        <div class="dialogue-text" id="dialogueText">Загрузка...</div>
    </div>
    <div class="click-hint" id="clickHint">▼ Нажмите на экран ▼</div>
    <div id="gamePanel"></div>
    <div class="evidence-count hidden" id="evidenceCount"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();

    let step = 'prologue';
    let prologueIndex = 0;
    let evidence = {
        rais: false, vahit: false, zuhra: false,
        doc1: false, doc2: false, doc3: false,
        fatima: false, photo: false
    };

    const prologueTexts = [
        { speaker: '🎭 Вы', text: 'Сельский совет. Небольшое здание, где решается судьба участка земли.' },
        { speaker: '🎭 Вы', text: 'Антагонист хочет построить здесь торговый центр. Но местные говорят — здесь было кладбище.' },
        { speaker: '👩‍💼 Глава сельсовета', text: 'Аксакалы расходятся во мнениях, архив сгорел. Помогите разобраться.' },
        { speaker: '👩‍💼 Глава сельсовета', text: 'Вот три папки с показаниями и доступ к архиву. Изучите всё.' }
    ];

    const witnesses = [
        { name: 'Аксакал Раис', text: '«Никаких могил я не помню. Рощу вырубили в 1960-х. Нужны рабочие места, а не легенды»', id: 'rais' },
        { name: 'Аксакал Вахит', text: '«Я помню могилы, камни с надписями. В 1960-х бульдозерами всё сровняли»', id: 'vahit' },
        { name: 'Аксакал Зухра', text: '«Слышала от бабушки про рощу. Но документов нет. Может, не стоит цепляться?»', id: 'zuhra' }
    ];

    const documents = [
        { name: 'Хозяйственная книга, 1960 г.', text: '«При работах обнаружены камни и старые корни. Корни сожжены»', id: 'doc1' },
        { name: 'Ответ из архива, 1989 г.', text: '«Документов о закрытии кладбищ не имеется. Часть утрачена»', id: 'doc2' },
        { name: 'Дневник археолога, 1985 г.', text: '«Тёмная почва, крапива, фрагменты керамики, обработанный камень»', id: 'doc3' }
    ];

    const extras = [
        { name: 'Бабушка Фатима', text: '«В детстве нас туда не пускали — там могилы. В 1960-х бульдозеры корни ломали»', id: 'fatima' },
        { name: 'Старая фотография, 1954 г.', text: 'На снимке видны тёмные холмики и деревья кругом.', id: 'photo' }
    ];

    function updateEvidenceCount() {
        let count = Object.values(evidence).filter(v => v === true).length;
        document.getElementById('evidenceCount').innerHTML = `📋 Улик собрано: ${count}/8`;
    }

    function showPrologue() {
        if (prologueIndex < prologueTexts.length) {
            document.getElementById('speakerName').innerHTML = prologueTexts[prologueIndex].speaker;
            document.getElementById('dialogueText').innerHTML = prologueTexts[prologueIndex].text;
        } else {
            startInvestigation();
        }
    }

    function startInvestigation() {
        step = 'investigation';
        document.getElementById('clickHint').classList.add('hidden');
        document.getElementById('evidenceCount').classList.remove('hidden');
        updateEvidenceCount();
        
        document.getElementById('speakerName').innerHTML = '📂 Расследование';
        document.getElementById('dialogueText').innerHTML = 'Изучите показания аксакалов, архивные документы и найдите дополнительные улики.';
        
        document.getElementById('gamePanel').innerHTML = `
            <div class="game-panel">
                <div class="doc-btn" onclick="showWitnesses()">📋 Показания аксакалов</div>
                <div class="doc-btn" onclick="showDocuments()">📁 Архивные документы</div>
                <div class="doc-btn" onclick="showExtras()">🔍 Дополнительные улики</div>
                <button onclick="finishInvestigation()">⚖️ Завершить расследование</button>
            </div>
        `;
    }

    function showWitnesses() {
        showList(witnesses, 0, 'witness');
    }

    function showDocuments() {
        showList(documents, 0, 'doc');
    }

    function showExtras() {
        showList(extras, 0, 'extra');
    }

    function showList(list, index, type) {
        if (index >= list.length) {
            startInvestigation();
            return;
        }
        let item = list[index];
        document.getElementById('speakerName').innerHTML = `📄 ${item.name}`;
        document.getElementById('dialogueText').innerHTML = item.text;
        
        let buttons = `<div class="game-panel">`;
        if (!evidence[item.id]) {
            buttons += `<button onclick="markItem(${index}, '${type}')">📌 Отметить как изученное</button>`;
        }
        buttons += `<button onclick="showList(${type === 'witness' ? 'witnesses' : (type === 'doc' ? 'documents' : 'extras')}, ${index + 1}, '${type}')">➡️ Далее</button>`;
        buttons += `<button onclick="startInvestigation()">🔙 Вернуться</button>`;
        buttons += `</div>`;
        document.getElementById('gamePanel').innerHTML = buttons;
    }

    function markItem(index, type) {
        let list = type === 'witness' ? witnesses : (type === 'doc' ? documents : extras);
        let item = list[index];
        evidence[item.id] = true;
        updateEvidenceCount();
        tg.showAlert('Отмечено!');
        showList(list, index + 1, type);
    }

    function finishInvestigation() {
        step = 'final';
        document.getElementById('speakerName').innerHTML = '⚖️ Суд аксакалов';
        document.getElementById('dialogueText').innerHTML = 'Вы собрали улики. Какая стратегия?';
        document.getElementById('gamePanel').innerHTML = `
            <div class="game-panel">
                <div class="doc-btn" onclick="makeChoice('harsh')">⚡ Жёсткое разоблачение</div>
                <div class="doc-btn" onclick="makeChoice('soft')">🤝 Мягкое убеждение</div>
                <div class="doc-btn" onclick="makeChoice('compromise')">🏛️ Компромисс</div>
            </div>
        `;
    }

    function makeChoice(choice) {
        let text = '';
        if (choice === 'harsh') text = 'Вы разоблачили Раиса. Суд признал землю исторической. Участок сохранён.';
        else if (choice === 'soft') text = 'Вы доказали ценность земли без обвинений. Раис изменил показания.';
        else text = 'Часть участка — под историческую зону, остальное — под развитие.';
        
        document.getElementById('speakerName').innerHTML = '🏆 Эпилог';
        document.getElementById('dialogueText').innerHTML = text + '\n\nГлава сельсовета благодарит вас.';
        document.getElementById('gamePanel').innerHTML = `<div class="game-panel"><button onclick="resetGame()">🎮 Пройти заново</button></div>`;
    }

    function resetGame() {
        location.reload();
    }

    document.body.addEventListener('click', (e) => {
        if (e.target.tagName !== 'BUTTON' && step === 'prologue') {
            prologueIndex++;
            showPrologue();
        }
    });

    showPrologue();
    tg.ready();
</script>
</body>
</html>
