<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Думбыра - визуальная новелла</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Segoe UI', serif;
            min-height: 100vh;
            background: #0a0a1a;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .scene {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }

        .scene.room {
            background-image: url('https://KulturniHod.github.io/dumbara-game/images/room.jpg');
        }
        .scene.dumbara {
            background-image: url('https://KulturniHod.github.io/dumbara-game/images/dumbara.png');
            background-size: contain;
            background-color: #2a1a0a;
        }
        .scene.diary {
            background-image: url('https://KulturniHod.github.io/dumbara-game/images/sages_diary.jpg');
        }
        .scene.chest {
            background-image: url('https://KulturniHod.github.io/dumbara-game/images/chest_open.jpg');
        }

        .dialogue-box {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #d4af37;
            color: #f0e6d2;
            font-size: 17px;
            line-height: 1.5;
            text-shadow: 1px 1px 2px black;
        }

        .speaker-name {
            color: #d4af37;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dialogue-text {
            font-size: 16px;
            line-height: 1.5;
        }

        .game-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-top: 10px;
        }

        .dumbara-panel {
            background: rgba(107, 58, 31, 0.95);
            border-radius: 40px;
            padding: 20px;
        }

        .string-row {
            margin: 20px 0;
        }

        .string-line {
            height: 4px;
            background: #d4af37;
            border-radius: 2px;
            margin: 10px 0;
            transition: all 0.2s;
        }

        .string-tuned {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .slider {
            width: 100%;
            margin: 10px 0;
        }

        button {
            background: linear-gradient(135deg, #d4af37, #b8960c);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .game-button {
            width: 100%;
        }

        /* Сетка для кнопок струн + пауза */
        .rhythm-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        .string-btn {
            background: linear-gradient(135deg, #d4af37, #b8960c);
        }

        .pause-btn {
            background: linear-gradient(135deg, #4a4a4a, #2a2a2a);
            color: #d4af37;
            border: 1px solid #d4af37;
        }

        .rhythm-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .rhythm-btn {
            flex: 1;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
        }

        .progress {
            text-align: center;
            margin-top: 15px;
            color: #d4af37;
            font-size: 14px;
        }

        .chest-icon {
            text-align: center;
            font-size: 60px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .chest-icon:hover {
            transform: scale(1.1);
        }

        .choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .choice-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid #d4af37;
            color: #d4af37;
            text-align: left;
            padding: 12px 16px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="scene room" id="scene">
            <div class="chest-icon" id="chestIcon">📦</div>

            <div class="dialogue-box" id="dialogueBox">
                <div class="speaker-name" id="speakerName">
                    <span>📖</span> Дневник сэсэна
                </div>
                <div class="dialogue-text" id="dialogueText">
                    «Думбыра — не просто инструмент. У неё три струны:<br>
                    1 — голос батыра (мужество) — низкий, упругий<br>
                    2 — голос коня (путь) — высокий, звонкий<br>
                    3 — голос ветра (судьба) — средний, певучий»
                </div>
            </div>

            <div id="gamePanel"></div>
            <div class="progress" id="progress">🎵 Струн настроено: 0/3</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        let state = {
            step: 'start',
            stringsTuned: [false, false, false],
            stringValues: [50, 50, 50],
            correctRhythm: ['batyr', 'yuly', 'ele'][Math.floor(Math.random() * 3)],
            rhythmSequence: [],
            rhythmPos: 0
        };

        const correctStringValues = [20, 80, 50];

        function updateBackground() {
            const sceneDiv = document.getElementById('scene');
            sceneDiv.classList.remove('room', 'dumbara', 'diary', 'chest');
            
            if (state.step === 'start') sceneDiv.classList.add('room');
            else if (state.step === 'tuning') sceneDiv.classList.add('dumbara');
            else if (state.step === 'rhythm') sceneDiv.classList.add('diary');
            else if (state.step === 'playing') sceneDiv.classList.add('dumbara');
            else if (state.step === 'victory') {
                sceneDiv.classList.add('chest');
                document.getElementById('chestIcon').style.display = 'none';
            }
        }

        function updateDialogue(speaker, text, icon = '📖') {
            document.getElementById('speakerName').innerHTML = `<span>${icon}</span> ${speaker}`;
            document.getElementById('dialogueText').innerHTML = text;
        }

        function render() {
            const panel = document.getElementById('gamePanel');
            const progress = document.getElementById('progress');
            const tunedCount = state.stringsTuned.filter(Boolean).length;
            progress.innerHTML = `🎵 Струн настроено: ${tunedCount}/3`;
            updateBackground();

            if (state.step === 'start') {
                panel.innerHTML = `<button class="game-button" onclick="startTuning()">🎸 Настроить думбыру</button>`;
            }
            else if (state.step === 'tuning') {
                let html = `<div class="game-panel"><div class="dumbara-panel">`;
                for (let i = 0; i < 3; i++) {
                    const tunedClass = state.stringsTuned[i] ? 'string-tuned' : '';
                    html += `
                        <div class="string-row">
                            <div><strong>Струна ${i+1}</strong> (${state.stringValues[i]}%)</div>
                            <div class="string-line ${tunedClass}" id="string-${i}"></div>
                            <input type="range" class="slider" id="slider-${i}" min="0" max="100" value="${state.stringValues[i]}">
                            <div style="font-size:12px; color:#aaa;">
                                ${i === 0 ? '↓ низкий, упругий (20%)' : i === 1 ? '↓ высокий, звонкий (80%)' : '↓ средний, певучий (50%)'}
                            </div>
                        </div>
                    `;
                }
                html += `<button class="game-button" onclick="finishTuning()">✅ Завершить настройку</button></div></div>`;
                panel.innerHTML = html;

                for (let i = 0; i < 3; i++) {
                    const slider = document.getElementById(`slider-${i}`);
                    if (slider) {
                        slider.addEventListener('input', (function(idx) {
                            return function(e) {
                                const val = parseInt(e.target.value);
                                state.stringValues[idx] = val;
                                const diff = Math.abs(val - correctStringValues[idx]);
                                state.stringsTuned[idx] = diff <= 15;
                                const stringLine = document.getElementById(`string-${idx}`);
                                if (state.stringsTuned[idx]) stringLine.classList.add('string-tuned');
                                else stringLine.classList.remove('string-tuned');
                                render();
                            };
                        })(i));
                    }
                }
            }
            else if (state.step === 'rhythm') {
                panel.innerHTML = `
                    <div class="game-panel">
                        <div class="rhythm-buttons">
                            <button class="rhythm-btn" onclick="chooseRhythm('batyr')">🎵 Хамақ батыра<br><small>подвиг, битва</small></button>
                            <button class="rhythm-btn" onclick="chooseRhythm('yuly')">🎵 Хамақ юлы<br><small>дорога, странствие</small></button>
                            <button class="rhythm-btn" onclick="chooseRhythm('ele')">🎵 Хамақ еле<br><small>ветер, судьба</small></button>
                        </div>
                    </div>
                `;
            }
            else if (state.step === 'playing') {
                let rhythmDisplay = '';
                if (state.rhythmSequence.length) {
                    rhythmDisplay = 'Ритм: ';
                    for (let i = 0; i < state.rhythmSequence.length; i++) {
                        rhythmDisplay += state.rhythmSequence[i] === -1 ? '⚫ пауза ' : `🔴 струна ${state.rhythmSequence[i]+1} `;
                    }
                }
                panel.innerHTML = `
                    <div class="game-panel">
                        <div class="dumbara-panel">
                            <div style="text-align:center; margin-bottom:15px;">🎸 ${rhythmDisplay}</div>
                            <div class="rhythm-grid">
                                <button class="string-btn" onclick="playString(0)">🎸 Струна 1</button>
                                <button class="string-btn" onclick="playString(1)">🎸 Струна 2</button>
                                <button class="string-btn" onclick="playString(2)">🎸 Струна 3</button>
                                <button class="pause-btn" onclick="playPause()">⏸ ПАУЗА</button>
                            </div>
                            <button class="game-button" onclick="resetRhythm()">🔄 Сбросить ритм</button>
                        </div>
                    </div>
                `;
            }
            else if (state.step === 'victory') {
                panel.innerHTML = `<div class="game-panel"><button class="game-button" onclick="resetGame()">🎮 Играть заново</button></div>`;
            }
        }

        function playPause() {
            if (state.step !== 'playing') return;
            
            const expected = state.rhythmSequence[state.rhythmPos];
            
            if (expected === -1) {
                state.rhythmPos++;
                if (state.rhythmPos >= state.rhythmSequence.length) {
                    state.step = 'victory';
                    updateDialogue('🏆 Победа!', 'Сундук сдвигается! Под ним открывается проход в подвал.', '🏆');
                    render();
                    tg.MainButton.setText('🏆 Поделиться победой');
                    tg.MainButton.show();
                } else {
                    tg.showAlert('✅ Пауза! Верно. Продолжаем...');
                    render();
                }
            } else {
                tg.showAlert('❌ Ошибка! Сейчас должна быть нота, а не пауза. Начинай заново.');
                state.rhythmPos = 0;
                render();
            }
        }

        function startTuning() {
            state.step = 'tuning';
            updateDialogue('Настройка думбыры', 'Подстрой каждую струну до нужного тона, ориентируясь на дневник.', '🎸');
            render();
        }

        function finishTuning() {
            if (state.stringsTuned.every(v => v === true)) {
                state.step = 'rhythm';
                updateDialogue('✨ Думбыра заговорила', 'Но ларец всё ещё закрыт. Нужен правильный хамаҡ.<br><br>На полях: «Сэсэн скучает по сыну, ушедшему в поход. Он играл один напев каждый вечер, глядя на восток»', '✨');
                render();
            } else {
                tg.showAlert('Настрой все три струны! Ориентируйся на описания тона.');
            }
        }

        function chooseRhythm(choice) {
            if (choice === state.correctRhythm) {
                let sequence = [];
                if (choice === 'batyr') sequence = [0, -1, 0, 0];
                else if (choice === 'yuly') sequence = [0, 0, -1, 0];
                else sequence = [0, 0, 0, -1];
                
                state.rhythmSequence = sequence;
                state.rhythmPos = 0;
                state.step = 'playing';
                
                let name = choice === 'batyr' ? 'Хамақ батыра' : (choice === 'yuly' ? 'Хамақ юлы' : 'Хамақ еле');
                updateDialogue('🎵 Игра', `Выбран ${name}. Сыграй мелодию в правильном ритме!\n\nНажимай на струны или кнопку ПАУЗА в нужном порядке.`, '🎵');
                render();
            } else {
                tg.showAlert('❌ Неправильно! Попробуй ещё раз.');
            }
        }

        function playString(stringId) {
            if (state.step !== 'playing') return;
            
            const expected = state.rhythmSequence[state.rhythmPos];
            
            if (expected === -1) {
                tg.showAlert('❌ Фальшивая нота! Сейчас должна быть пауза. Нажми кнопку ПАУЗА.', '❌');
                state.rhythmPos = 0;
                render();
                return;
            }
            
            if (expected === stringId) {
                state.rhythmPos++;
                
                if (state.rhythmPos >= state.rhythmSequence.length) {
                    state.step = 'victory';
                    updateDialogue('🏆 Победа!', 'Сундук сдвигается! Под ним открывается проход в подвал.', '🏆');
                    render();
                    tg.MainButton.setText('🏆 Поделиться победой');
                    tg.MainButton.show();
                } else {
                    tg.showAlert('✅ Верно! Следующая нота...');
                    render();
                }
            } else {
                tg.showAlert(`❌ Не та струна! Нужно нажать струну ${expected+1}. Начинай заново.`);
                state.rhythmPos = 0;
                render();
            }
        }

        function resetRhythm() {
            state.rhythmPos = 0;
            tg.showAlert('🔄 Ритм сброшен. Начинай сначала!');
            render();
        }

        function resetGame() {
            state = {
                step: 'start',
                stringsTuned: [false, false, false],
                stringValues: [50, 50, 50],
                correctRhythm: ['batyr', 'yuly', 'ele'][Math.floor(Math.random() * 3)],
                rhythmSequence: [],
                rhythmPos: 0
            };
            updateDialogue('📖 Дневник сэсэна', '«Думбыра — не просто инструмент. У неё три струны...»', '📖');
            document.getElementById('chestIcon').style.display = 'block';
            render();
            tg.MainButton.hide();
        }

        document.getElementById('chestIcon').onclick = () => {
            if (state.step === 'start') startTuning();
        };

        render();
        tg.ready();
    </script>
</body>
</html>
