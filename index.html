<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Думбыра - визуальная новелла</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Georgia', 'Segoe UI', serif;
            min-height: 100vh;
            background: #0a0a1a;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            overflow-y: auto;
        }

        .scene {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            cursor: pointer;
        }

        .scene.room { background-image: url('https://KulturniHod.github.io/dumbara-game/images/room.jpg'); }
        .scene.dumbara { background-image: url('https://KulturniHod.github.io/dumbara-game/images/dumbara.png'); background-size: contain; background-color: #2a1a0a; }
        .scene.diary { background-image: url('https://KulturniHod.github.io/dumbara-game/images/sages_diary.jpg'); }
        .scene.chest { background-image: url('https://KulturniHod.github.io/dumbara-game/images/chest_open.jpg'); }
        .scene.black { background: #0a0a1a; }

        .dialogue-box {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #d4af37;
            color: #f0e6d2;
            font-size: 17px;
            line-height: 1.5;
            text-shadow: 1px 1px 2px black;
        }

        .speaker-name {
            color: #d4af37;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dialogue-text {
            font-size: 16px;
            line-height: 1.5;
        }

        .game-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-top: 10px;
        }

        .dumbara-panel {
            background: rgba(107, 58, 31, 0.95);
            border-radius: 40px;
            padding: 20px;
        }

        .string-row {
            margin: 20px 0;
        }

        .string-line {
            height: 4px;
            background: #d4af37;
            border-radius: 2px;
            margin: 10px 0;
            transition: all 0.2s;
        }

        .string-tuned {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .slider {
            width: 100%;
            margin: 10px 0;
        }

        button {
            background: linear-gradient(135deg, #d4af37, #b8960c);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .game-button {
            width: 100%;
        }

        .rhythm-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        .string-btn {
            background: linear-gradient(135deg, #d4af37, #b8960c);
        }

        .pause-btn {
            background: linear-gradient(135deg, #4a4a4a, #2a2a2a);
            color: #d4af37;
            border: 1px solid #d4af37;
        }

        .rhythm-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .rhythm-btn {
            flex: 1;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
        }

        .progress {
            text-align: center;
            margin-top: 15px;
            color: #d4af37;
            font-size: 14px;
        }

        .chest-icon {
            text-align: center;
            font-size: 60px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .chest-icon:hover {
            transform: scale(1.1);
        }

        .click-hint {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="scene black" id="scene">
            <div class="dialogue-box" id="dialogueBox">
                <div class="speaker-name" id="speakerName">
                    <span>🎭</span> Вы
                </div>
                <div class="dialogue-text" id="dialogueText">
                    Загрузка...
                </div>
            </div>
            <div class="click-hint" id="clickHint">▼ Нажмите на экран, чтобы продолжить ▼</div>
            <div id="gamePanel"></div>
            <div class="progress" id="progress" style="display:none;"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        // ========== СЦЕНАРИЙ ==========
        let narrativeStep = 0;
        let state = {
            mode: 'narrative', // narrative, tuning, rhythm_selection, rhythm_game, victory
            stringsTuned: [false, false, false],
            stringValues: [50, 50, 50],
            correctRhythm: ['batyr', 'yuly', 'ele'][Math.floor(Math.random() * 3)],
            rhythmSequence: [],
            rhythmPos: 0
        };

        const correctStringValues = [20, 80, 50];

        // Сцены повествования (по клику на экран)
        const narrativeScenes = [
            {
                speaker: 'Вы',
                icon: '🎭',
                text: 'Исследуя старинный дом, я натыкаюсь на пыльный, забытый угол...'
            },
            {
                speaker: 'Вы',
                icon: '🎭',
                text: 'Передо мной — огромный деревянный сундук. Он закрывает вход в подвал.'
            },
            {
                speaker: 'Вы',
                icon: '🎭',
                text: 'На крышке выгравирована странная думбыра. Внутри — старый инструмент и потрёпанный дневник.'
            },
            {
                speaker: 'Вы',
                icon: '🎭',
                text: 'Дневник принадлежал сэсэну — сказителю, который играл на этой думбыре более 20 лет назад...',
                action: 'showDiary'
            }
        ];

        const diaryPages = [
            {
                speaker: '📖 Страница 12',
                icon: '📖',
                text: '«Думбыра — не просто инструмент. У неё три струны:<br><br>• Первая — голос батыра (мужество)<br>• Вторая — голос коня (путь)<br>• Третья — голос ветра (судьба)<br><br>Если хоть одна струна молчит или врёт — думбыра не заговорит.»'
            },
            {
                speaker: '📖 Страница 17',
                icon: '📖',
                text: '«Первая струна — звук удара копыта о землю (низкий, упругий).<br><br>Вторая — свист стрелы в полёте (высокий, звонкий).<br><br>Третья — шелест знамени на ветру (средний, певучий).»'
            },
            {
                speaker: '📖 Страница 17 (продолжение)',
                icon: '📖',
                text: '«Мой учитель говорил:<br><br>"Не пальцы играют — сердце сказителя струны ведёт. Но если не знаешь хамаҡа, даже настроенная думбыра молчит".»',
                action: 'startTuning'
            }
        ];

        const diaryPage24 = [
            {
                speaker: '📖 Страница 24',
                icon: '📖',
                text: '«Думбыра заговорила. Но ларец всё ещё закрыт. Значит, нужен правильный хамаҡ. Я записал три напева.»'
            },
            {
                speaker: '📖 Поле дневника',
                icon: '📖',
                text: '«Тот, кто сделал этот ларец, был сэсэном, который скучает по сыну, ушедшему в дальний поход. Он играл один напев каждый вечер, глядя на восток. Я записал, но не могу вспомнить, какой именно...»',
                action: 'startRhythmSelection'
            }
        ];

        let currentNarrativeIndex = 0;
        let currentDiaryIndex = 0;
        let currentPage24Index = 0;

        // UI элементы
        const sceneDiv = document.getElementById('scene');
        const speakerNameSpan = document.getElementById('speakerName');
        const dialogueTextSpan = document.getElementById('dialogueText');
        const gamePanelDiv = document.getElementById('gamePanel');
        const progressDiv = document.getElementById('progress');
        const clickHint = document.getElementById('clickHint');

        function updateBackground(bgType) {
            sceneDiv.classList.remove('room', 'dumbara', 'diary', 'chest', 'black');
            sceneDiv.classList.add(bgType);
        }

        function showNarrative() {
            updateBackground('black');
            gamePanelDiv.innerHTML = '';
            progressDiv.style.display = 'none';
            clickHint.style.display = 'block';
            
            if (currentNarrativeIndex < narrativeScenes.length) {
                const scene = narrativeScenes[currentNarrativeIndex];
                speakerNameSpan.innerHTML = `<span>${scene.icon}</span> ${scene.speaker}`;
                dialogueTextSpan.innerHTML = scene.text;
            } else {
                // Переход к дневнику
                currentDiaryIndex = 0;
                showDiary();
            }
        }

        function showDiary() {
            updateBackground('diary');
            gamePanelDiv.innerHTML = '';
            progressDiv.style.display = 'none';
            clickHint.style.display = 'block';
            
            if (currentDiaryIndex < diaryPages.length) {
                const page = diaryPages[currentDiaryIndex];
                speakerNameSpan.innerHTML = `<span>${page.icon}</span> ${page.speaker}`;
                dialogueTextSpan.innerHTML = page.text;
                
                if (page.action === 'startTuning') {
                    // После этой страницы начнётся настройка
                }
            } else {
                // Начинаем настройку струн
                startTuningMode();
            }
        }

        function showPage24() {
            updateBackground('diary');
            gamePanelDiv.innerHTML = '';
            progressDiv.style.display = 'none';
            clickHint.style.display = 'block';
            
            if (currentPage24Index < diaryPage24.length) {
                const page = diaryPage24[currentPage24Index];
                speakerNameSpan.innerHTML = `<span>${page.icon}</span> ${page.speaker}`;
                dialogueTextSpan.innerHTML = page.text;
                
                if (page.action === 'startRhythmSelection') {
                    // Будет вызвано после клика
                }
            }
        }

        function startTuningMode() {
            state.mode = 'tuning';
            updateBackground('dumbara');
            clickHint.style.display = 'none';
            progressDiv.style.display = 'block';
            
            speakerNameSpan.innerHTML = `<span>🎸</span> Настройка думбыры`;
            dialogueTextSpan.innerHTML = 'Подстрой каждую струну до нужного тона, ориентируясь на дневник.';
            
            renderTuningPanel();
        }

        function renderTuningPanel() {
            let html = `<div class="game-panel"><div class="dumbara-panel">`;
            for (let i = 0; i < 3; i++) {
                const tunedClass = state.stringsTuned[i] ? 'string-tuned' : '';
                html += `
                    <div class="string-row">
                        <div><strong>Струна ${i+1}</strong> (${state.stringValues[i]}%)</div>
                        <div class="string-line ${tunedClass}" id="string-${i}"></div>
                        <input type="range" class="slider" id="slider-${i}" min="0" max="100" value="${state.stringValues[i]}">
                        <div style="font-size:12px; color:#aaa;">
                            ${i === 0 ? '↓ низкий, упругий (20%)' : i === 1 ? '↓ высокий, звонкий (80%)' : '↓ средний, певучий (50%)'}
                        </div>
                    </div>
                `;
            }
            html += `<button class="game-button" onclick="finishTuning()">✅ Завершить настройку</button></div></div>`;
            gamePanelDiv.innerHTML = html;

            for (let i = 0; i < 3; i++) {
                const slider = document.getElementById(`slider-${i}`);
                if (slider) {
                    slider.addEventListener('input', (function(idx) {
                        return function(e) {
                            const val = parseInt(e.target.value);
                            state.stringValues[idx] = val;
                            const diff = Math.abs(val - correctStringValues[idx]);
                            state.stringsTuned[idx] = diff <= 15;
                            const stringLine = document.getElementById(`string-${idx}`);
                            if (state.stringsTuned[idx]) stringLine.classList.add('string-tuned');
                            else stringLine.classList.remove('string-tuned');
                            const tunedCount = state.stringsTuned.filter(Boolean).length;
                            progressDiv.innerHTML = `🎵 Струн настроено: ${tunedCount}/3`;
                        };
                    })(i));
                }
            }
            const tunedCount = state.stringsTuned.filter(Boolean).length;
            progressDiv.innerHTML = `🎵 Струн настроено: ${tunedCount}/3`;
        }

        function finishTuning() {
            if (state.stringsTuned.every(v => v === true)) {
                currentPage24Index = 0;
                showPage24();
            } else {
                tg.showAlert('Настрой все три струны! Ориентируйся на описания тона.');
            }
        }

        function startRhythmSelection() {
            state.mode = 'rhythm_selection';
            updateBackground('diary');
            clickHint.style.display = 'none';
            
            speakerNameSpan.innerHTML = `<span>🎵</span> Выбор хамака`;
            dialogueTextSpan.innerHTML = 'Какой напев играл сэсэн каждый вечер, глядя на восток?';
            
            gamePanelDiv.innerHTML = `
                <div class="game-panel">
                    <div class="rhythm-buttons">
                        <button class="rhythm-btn" onclick="chooseRhythm('batyr')">🎵 Хамақ батыра<br><small>подвиг, битва</small></button>
                        <button class="rhythm-btn" onclick="chooseRhythm('yuly')">🎵 Хамақ юлы<br><small>дорога, странствие</small></button>
                        <button class="rhythm-btn" onclick="chooseRhythm('ele')">🎵 Хамақ еле<br><small>ветер, судьба</small></button>
                    </div>
                </div>
            `;
        }

        function chooseRhythm(choice) {
            if (choice === state.correctRhythm) {
                let sequence = [];
                if (choice === 'batyr') sequence = [0, -1, 0, 0];
                else if (choice === 'yuly') sequence = [0, 0, -1, 0];
                else sequence = [0, 0, 0, -1];
                
                state.rhythmSequence = sequence;
                state.rhythmPos = 0;
                state.mode = 'rhythm_game';
                
                updateBackground('dumbara');
                let name = choice === 'batyr' ? 'Хамақ батыра' : (choice === 'yuly' ? 'Хамақ юлы' : 'Хамақ еле');
                speakerNameSpan.innerHTML = `<span>🎵</span> Игра на думбыре`;
                dialogueTextSpan.innerHTML = `Выбран ${name}. Сыграй мелодию в правильном ритме!`;
                
                renderRhythmGame();
            } else {
                tg.showAlert('❌ Неправильно! Попробуй ещё раз.');
            }
        }

        function renderRhythmGame() {
            let rhythmDisplay = '';
            if (state.rhythmSequence.length) {
                rhythmDisplay = 'Ритм: ';
                for (let i = 0; i < state.rhythmSequence.length; i++) {
                    rhythmDisplay += state.rhythmSequence[i] === -1 ? '⚫ пауза ' : `🔴 струна ${state.rhythmSequence[i]+1} `;
                }
            }
            gamePanelDiv.innerHTML = `
                <div class="game-panel">
                    <div class="dumbara-panel">
                        <div style="text-align:center; margin-bottom:15px;">🎸 ${rhythmDisplay}</div>
                        <div class="rhythm-grid">
                            <button class="string-btn" onclick="playString(0)">🎸 Струна 1</button>
                            <button class="string-btn" onclick="playString(1)">🎸 Струна 2</button>
                            <button class="string-btn" onclick="playString(2)">🎸 Струна 3</button>
                            <button class="pause-btn" onclick="playPause()">⏸ ПАУЗА</button>
                        </div>
                        <button class="game-button" onclick="resetRhythm()">🔄 Сбросить ритм</button>
                    </div>
                </div>
            `;
            progressDiv.innerHTML = '🎵 Сыграй мелодию!';
        }

        function playPause() {
            if (state.mode !== 'rhythm_game') return;
            
            const expected = state.rhythmSequence[state.rhythmPos];
            
            if (expected === -1) {
                state.rhythmPos++;
                if (state.rhythmPos >= state.rhythmSequence.length) {
                    victory();
                } else {
                    tg.showAlert('✅ Пауза! Верно. Продолжаем...');
                    renderRhythmGame();
                }
            } else {
                tg.showAlert('❌ Ошибка! Сейчас должна быть нота, а не пауза. Начинай заново.');
                state.rhythmPos = 0;
                renderRhythmGame();
            }
        }

        function playString(stringId) {
            if (state.mode !== 'rhythm_game') return;
            
            const expected = state.rhythmSequence[state.rhythmPos];
            
            if (expected === -1) {
                tg.showAlert('❌ Фальшивая нота! Сейчас должна быть пауза. Нажми кнопку ПАУЗА.');
                state.rhythmPos = 0;
                renderRhythmGame();
                return;
            }
            
            if (expected === stringId) {
                state.rhythmPos++;
                if (state.rhythmPos >= state.rhythmSequence.length) {
                    victory();
                } else {
                    tg.showAlert('✅ Верно! Следующая нота...');
                    renderRhythmGame();
                }
            } else {
                tg.showAlert(`❌ Не та струна! Нужно нажать струну ${expected+1}. Начинай заново.`);
                state.rhythmPos = 0;
                renderRhythmGame();
            }
        }

        function victory() {
            state.mode = 'victory';
            updateBackground('chest');
            speakerNameSpan.innerHTML = `<span>🏆</span> Победа!`;
            dialogueTextSpan.innerHTML = 'Сундук сдвигается! Под ним открывается проход в подвал. Ты справился с загадкой думбыры!';
            gamePanelDiv.innerHTML = `<div class="game-panel"><button class="game-button" onclick="resetGame()">🎮 Играть заново</button></div>`;
            progressDiv.style.display = 'none';
            tg.MainButton.setText('🏆 Поделиться победой');
            tg.MainButton.show();
        }

        function resetRhythm() {
            state.rhythmPos = 0;
            tg.showAlert('🔄 Ритм сброшен. Начинай сначала!');
            renderRhythmGame();
        }

        function resetGame() {
            state = {
                mode: 'narrative',
                stringsTuned: [false, false, false],
                stringValues: [50, 50, 50],
                correctRhythm: ['batyr', 'yuly', 'ele'][Math.floor(Math.random() * 3)],
                rhythmSequence: [],
                rhythmPos: 0
            };
            currentNarrativeIndex = 0;
            currentDiaryIndex = 0;
            currentPage24Index = 0;
            narrativeStep = 0;
            
            updateBackground('black');
            showNarrative();
            tg.MainButton.hide();
        }

        // Обработка клика по экрану для пролистывания текста
        sceneDiv.addEventListener('click', (e) => {
            // Если клик не по кнопке
            if (e.target.tagName === 'BUTTON') return;
            
            if (state.mode === 'narrative') {
                currentNarrativeIndex++;
                showNarrative();
            } 
            else if (state.mode === 'narrative_diary') {
                currentDiaryIndex++;
                showDiary();
            }
            else if (state.mode === 'tuning') {
                // Ничего, режим настройки
            }
            else if (state.mode === 'rhythm_selection') {
                // Ничего
            }
            else if (state.mode === 'rhythm_game') {
                // Ничего
            }
            else if (state.mode === 'victory') {
                // Ничего
            }
        });

        // Переопределяем showDiary для кликов
        const originalShowDiary = showDiary;
        window.showDiary = function() {
            if (state.mode === 'narrative') {
                state.mode = 'narrative_diary';
                currentDiaryIndex = 0;
                originalShowDiary();
            }
        };

        // Старт
        showNarrative();
        tg.ready();
    </script>
</body>
</html>
